name: Build iOS IPA

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Build name, for example 0.1.136"
        required: true
        default: "0.1.136"
      build_number:
        description: "Build number, for example 1136"
        required: true
        default: "1136"
      export_method:
        description: "iOS export method: ad-hoc, app-store, development, or enterprise"
        required: true
        default: "ad-hoc"

jobs:
  build-ios-ipa:
    runs-on: macos-15
    defaults:
      run:
        working-directory: Flutter

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.9"
          channel: "stable"
          cache: true

      - name: Install Apple signing assets
        env:
          IOS_CERTIFICATE_P12_BASE64: ${{ secrets.IOS_CERTIFICATE_P12_BASE64 }}
          IOS_CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.IOS_KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          if [[ -z "${IOS_CERTIFICATE_P12_BASE64}" || -z "${IOS_PROVISIONING_PROFILE_BASE64}" ]]; then
            echo "Missing iOS signing secrets." >&2
            exit 1
          fi

          CERTIFICATE_PATH="$RUNNER_TEMP/ava_ios_certificate.p12"
          PROFILE_PATH="$RUNNER_TEMP/ava_ios_profile.mobileprovision"
          KEYCHAIN_PATH="$RUNNER_TEMP/ava-ios-signing.keychain-db"
          KEYCHAIN_PASSWORD="${KEYCHAIN_PASSWORD:-ava-temporary-keychain}"

          echo "$IOS_CERTIFICATE_P12_BASE64" | base64 -D > "$CERTIFICATE_PATH"
          echo "$IOS_PROVISIONING_PROFILE_BASE64" | base64 -D > "$PROFILE_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$IOS_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          security cms -D -i "$PROFILE_PATH" > "$RUNNER_TEMP/ava_ios_profile.plist"
          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c 'Print UUID' "$RUNNER_TEMP/ava_ios_profile.plist")
          cp "$PROFILE_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles/$PROFILE_UUID.mobileprovision"

      - name: Resolve signing profile name
        id: signing
        env:
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          set -euo pipefail
          PROFILE_PATH="$RUNNER_TEMP/ava_ios_profile.mobileprovision"
          echo "$IOS_PROVISIONING_PROFILE_BASE64" | base64 -D > "$PROFILE_PATH"
          security cms -D -i "$PROFILE_PATH" > "$RUNNER_TEMP/ava_ios_profile.plist"
          PROFILE_NAME=$(/usr/libexec/PlistBuddy -c 'Print Name' "$RUNNER_TEMP/ava_ios_profile.plist")
          echo "profile_name=$PROFILE_NAME" >> "$GITHUB_OUTPUT"

      - name: Flutter pub get
        run: flutter pub get

      - name: Prepare ExportOptions.plist
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          IOS_BUNDLE_ID: ${{ secrets.IOS_BUNDLE_ID }}
          IOS_EXPORT_METHOD: ${{ inputs.export_method }}
          IOS_PROVISIONING_PROFILE_NAME: ${{ steps.signing.outputs.profile_name }}
        run: |
          set -euo pipefail
          : "${APPLE_TEAM_ID:?Missing APPLE_TEAM_ID secret}"
          : "${IOS_BUNDLE_ID:?Missing IOS_BUNDLE_ID secret}"
          : "${IOS_PROVISIONING_PROFILE_NAME:?Missing provisioning profile name}"
          ruby -e '
            text = File.read("tooling/ios/export_options.plist")
            {
              "$(APPLE_TEAM_ID)" => ENV.fetch("APPLE_TEAM_ID"),
              "$(IOS_BUNDLE_ID)" => ENV.fetch("IOS_BUNDLE_ID"),
              "$(IOS_EXPORT_METHOD)" => ENV.fetch("IOS_EXPORT_METHOD"),
              "$(IOS_PROVISIONING_PROFILE_NAME)" => ENV.fetch("IOS_PROVISIONING_PROFILE_NAME")
            }.each { |key, value| text = text.gsub(key, value) }
            File.write(ENV.fetch("RUNNER_TEMP") + "/ExportOptions.plist", text)
          '
          cat "$RUNNER_TEMP/ExportOptions.plist"

      - name: Apply iOS signing settings
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          IOS_BUNDLE_ID: ${{ secrets.IOS_BUNDLE_ID }}
          IOS_PROVISIONING_PROFILE_NAME: ${{ steps.signing.outputs.profile_name }}
        run: |
          set -euo pipefail
          ruby -e '
            path = "ios/Runner.xcodeproj/project.pbxproj"
            text = File.read(path)
            bundle_id = ENV.fetch("IOS_BUNDLE_ID")
            team_id = ENV.fetch("APPLE_TEAM_ID")
            profile = ENV.fetch("IOS_PROVISIONING_PROFILE_NAME")

            text = text.gsub(/PRODUCT_BUNDLE_IDENTIFIER = com\.ava\.avaFlutter;/, "PRODUCT_BUNDLE_IDENTIFIER = #{bundle_id};")
            text = text.gsub(/CODE_SIGN_STYLE = Automatic;/, "CODE_SIGN_STYLE = Manual;")
            text = text.gsub(/(CODE_SIGN_STYLE = Manual;\n)/, "\\1				DEVELOPMENT_TEAM = #{team_id};\n				PROVISIONING_PROFILE_SPECIFIER = #{profile};\n")
            File.write(path, text)
          '

      - name: Build signed IPA
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          IOS_BUNDLE_ID: ${{ secrets.IOS_BUNDLE_ID }}
          AVA_API_BASE_URL: "http://112.166.136.198:8080"
          AVA_WS_URL: "ws://112.166.136.198:8080/ws"
        run: |
          set -euo pipefail
          flutter build ipa \
            --build-name="${{ inputs.version }}" \
            --build-number="${{ inputs.build_number }}" \
            --export-options-plist="$RUNNER_TEMP/ExportOptions.plist" \
            --dart-define=AVA_API_BASE_URL="$AVA_API_BASE_URL" \
            --dart-define=AVA_WS_URL="$AVA_WS_URL"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ava-ios-${{ inputs.version }}-${{ inputs.build_number }}-ipa
          path: Flutter/build/ios/ipa/*.ipa
