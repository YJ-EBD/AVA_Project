name: Backend Test

on:
  pull_request:
    paths:
      - "SpringBoot/**"
  push:
    branches: [main, develop]
    paths:
      - "SpringBoot/**"

jobs:
  test:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: SpringBoot
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - run: .\gradlew.bat test
