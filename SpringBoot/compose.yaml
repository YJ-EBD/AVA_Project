services:
  mongodb:
    image: 'mongo:7'
    environment:
      MONGO_INITDB_DATABASE: ava
      MONGO_INITDB_ROOT_PASSWORD: ava_password
      MONGO_INITDB_ROOT_USERNAME: ava
    ports:
      - '27017:27017'
    volumes:
      - ava_mongodb_data:/data/db
  postgres:
    image: 'postgres:16-alpine'
    environment:
      POSTGRES_DB: ava
      POSTGRES_PASSWORD: ava_password
      POSTGRES_USER: ava
    ports:
      - '5432:5432'
    volumes:
      - ava_postgres_data:/var/lib/postgresql/data
  redis:
    image: 'redis:7-alpine'
    ports:
      - '6379:6379'
    volumes:
      - ava_redis_data:/data

volumes:
  ava_mongodb_data:
  ava_postgres_data:
  ava_redis_data:
